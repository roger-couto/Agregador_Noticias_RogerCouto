# Banco de Dados PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/agora_db
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Server
server.port=8080

# NewsAPI
newsapi.key=179e4547d6ec4e879ff3a6ec89d5a445
newsapi.base-url=https://newsapi.org/v2

# JWT
jwt.secret=agoraSuperSecretKeyForJWT2025NewsAggregatorProject
jwt.expiration=86400000

# Logging
logging.level.br.com.agora=DEBUG
